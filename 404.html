<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#030403">
  <title>Cygnus X-1 | Route Not Found</title>
  <style>
    :root { color-scheme: dark; --bg:#030403; --ink:#f7f1e8; --muted:#8b847a; --line:rgba(247,241,232,.16); --green:#00f0a8; --blue:#75b9ff; --amber:#ff9b54; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:2rem; color:var(--ink); font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:radial-gradient(circle at 70% 20%,rgba(0,240,168,.12),transparent 34vw),linear-gradient(180deg,#030403,#080c09); }
    main { width:min(760px,100%); border:1px solid var(--line); border-radius:8px; padding:clamp(1.25rem,5vw,3rem); background:rgba(5,7,6,.86); box-shadow:0 30px 90px rgba(0,0,0,.45); }
    p.label { margin:0 0 1rem; color:var(--green); font:700 .75rem ui-monospace,SFMono-Regular,Consolas,monospace; letter-spacing:.16em; text-transform:uppercase; }
    h1 { margin:0; font-size:clamp(2.6rem,12vw,6rem); line-height:.9; letter-spacing:-.04em; }
    p { color:var(--muted); max-width:58ch; line-height:1.6; }
    nav { display:flex; flex-wrap:wrap; gap:.7rem; margin-top:1.5rem; }
    a { color:var(--ink); text-decoration:none; border:1px solid var(--line); border-radius:6px; padding:.8rem 1rem; font-weight:800; font-size:.78rem; letter-spacing:.1em; text-transform:uppercase; }
    a:first-child { border-color:rgba(0,240,168,.58); background:rgba(0,240,168,.1); }
  </style>
</head>
<body>
  <main>
    <p class="label">CYGNUS OS / route fallback</p>
    <h1>Route not found.</h1>
    <p>The requested route is not part of the public Cygnus X-1 surface. Return to the main site or open a clean public entry route.</p>
    <nav aria-label="Fallback navigation">
      <a href="/">Home</a>
      <a href="/thesis/">Thesis</a>
      <a href="/investor/">Investor Access</a>
    </nav>
  </main>
</body>
</html>
